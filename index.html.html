
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JagoFolup Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900">

<div class="min-h-screen flex">

  <aside class="hidden md:flex w-72 bg-white border-r border-slate-200 min-h-screen flex-col p-6">
    <div>
      <h1 class="text-3xl font-bold text-teal-600">JagoFolup</h1>
      <p class="text-sm text-slate-500 mt-2">
        CRM ringan buat marketer relationship-based.
      </p>
    </div>

    <nav class="mt-10 space-y-2">
      <button class="w-full text-left px-4 py-3 rounded-2xl bg-teal-50 text-teal-700 font-semibold">
        Dashboard
      </button>

      <button class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100">
        Projects
      </button>

      <button class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100">
        Leads
      </button>

      <button class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100">
        Pipeline
      </button>

      <button class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100">
        Tasks
      </button>

      <button class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100">
        Templates
      </button>
    </nav>

    <div class="mt-auto bg-teal-50 rounded-3xl p-5">
      <p class="text-sm text-slate-600">Today's Focus</p>
      <h3 class="font-semibold text-lg mt-1">
        7 leads need follow up.
      </h3>
    </div>
  </aside>

  <main class="flex-1 p-4 md:p-8">

    <div class="flex items-center justify-between mb-8">
      <div>
        <p class="text-slate-500 text-sm">Assalamu’alaikum</p>
        <h2 class="text-3xl font-bold mt-1">Ifam 👋</h2>
      </div>

      <div class="w-12 h-12 rounded-full bg-teal-500 flex items-center justify-center text-white font-bold">
        I
      </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-2xl">🔥</div>
        <p class="text-slate-500 text-sm mt-3">Hot Leads</p>
        <h3 class="text-3xl font-bold mt-1">12</h3>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-2xl">📅</div>
        <p class="text-slate-500 text-sm mt-3">Follow Up Today</p>
        <h3 class="text-3xl font-bold mt-1">7</h3>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-2xl">⚠️</div>
        <p class="text-slate-500 text-sm mt-3">Overdue</p>
        <h3 class="text-3xl font-bold mt-1">3</h3>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
        <div class="text-2xl">✅</div>
        <p class="text-slate-500 text-sm mt-3">Closing This Month</p>
        <h3 class="text-3xl font-bold mt-1">8</h3>
      </div>

    </div>

    <div class="flex gap-3 overflow-x-auto pb-2 mb-8">
      <button class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-3 rounded-2xl font-medium">
        + Add Lead
      </button>

      <button class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-3 rounded-2xl font-medium">
        + Add Task
      </button>

      <button class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-3 rounded-2xl font-medium">
        + Add Project
      </button>
    </div>

    <section class="mb-10">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-2xl font-bold">Projects</h3>

        <button class="text-teal-600 font-medium">
          See all
        </button>
      </div>

      <div class="grid md:grid-cols-3 gap-4">

        <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm">
          <div class="flex items-center justify-between">
            <h4 class="font-semibold text-lg">Jordan 2026</h4>
            <span class="text-sm text-slate-500">43 leads</span>
          </div>

          <div class="mt-5">
            <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-teal-500 rounded-full" style="width:72%"></div>
            </div>

            <p class="text-sm text-slate-500 mt-2">
              72% progress
            </p>
          </div>
        </div>

        <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm">
          <div class="flex items-center justify-between">
            <h4 class="font-semibold text-lg">Turki Edu Trip</h4>
            <span class="text-sm text-slate-500">18 leads</span>
          </div>

          <div class="mt-5">
            <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-teal-500 rounded-full" style="width:45%"></div>
            </div>

            <p class="text-sm text-slate-500 mt-2">
              45% progress
            </p>
          </div>
        </div>

      </div>
    </section>

  </main>

</div>

</body>
</html>
