<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JagoFolup V1</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
<div class="flex min-h-screen">
  <aside class="w-72 bg-white border-r p-6 hidden md:block">
    <h1 class="text-3xl font-bold text-teal-600">JagoFolup</h1>
    <p class="text-slate-500 mt-2">Mesin anti lupa follow up</p>
    <div class="mt-8 space-y-2">
      <button onclick="showPage('dashboard')" class="w-full text-left p-3 rounded-xl bg-teal-50">Dashboard</button>
      <button onclick="showPage('leads')" class="w-full text-left p-3 rounded-xl">Leads</button>
    </div>
  </aside>

  <main class="flex-1 p-6">
    <div id="dashboardPage">
      <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
      <div class="grid md:grid-cols-4 gap-4">
        <div class="bg-white p-5 rounded-3xl border"><div>🔥 Hot Leads</div><div id="hotCount" class="text-3xl font-bold">0</div></div>
        <div class="bg-white p-5 rounded-3xl border"><div>📅 Follow Up</div><div id="followCount" class="text-3xl font-bold">0</div></div>
        <div class="bg-white p-5 rounded-3xl border"><div>⚠️ Overdue</div><div id="overdueCount" class="text-3xl font-bold">0</div></div>
        <div class="bg-white p-5 rounded-3xl border"><div>✅ Closing</div><div id="closingCount" class="text-3xl font-bold">0</div></div>
      </div>
    </div>

    <div id="leadsPage" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold">Leads</h2>
        <button onclick="openModal()" class="bg-teal-600 text-white px-4 py-3 rounded-xl">+ Tambah Lead</button>
      </div>
      <div id="leadList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>
  </main>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
<div class="bg-white p-5 rounded-3xl w-full max-w-md">
<h3 class="font-bold text-xl mb-4">Tambah Lead</h3>
<input id="name" class="w-full border p-3 rounded mb-2" placeholder="Nama">
<input id="phone" class="w-full border p-3 rounded mb-2" placeholder="No WA">
<input id="school" class="w-full border p-3 rounded mb-2" placeholder="Sekolah">
<input id="project" class="w-full border p-3 rounded mb-2" placeholder="Project">
<select id="status" class="w-full border p-3 rounded mb-2">
<option>New</option><option>Contacted</option><option>Follow Up</option><option>Hot</option><option>Closing</option><option>Lost</option>
</select>
<textarea id="note" class="w-full border p-3 rounded mb-3" placeholder="Catatan"></textarea>
<button onclick="saveLead()" class="bg-teal-600 text-white px-4 py-2 rounded">Simpan</button>
<button onclick="closeModal()" class="ml-2 bg-slate-200 px-4 py-2 rounded">Batal</button>
</div></div>

<script>
let leads=JSON.parse(localStorage.getItem("jagofolup_v1")||"[]");

function showPage(p){
dashboardPage.classList.add("hidden");
leadsPage.classList.add("hidden");
if(p==="dashboard") dashboardPage.classList.remove("hidden");
if(p==="leads") leadsPage.classList.remove("hidden");
}

function openModal(){modal.classList.remove("hidden")}
function closeModal(){modal.classList.add("hidden")}

function saveLead(){
leads.push({
id:Date.now(),
name:name.value,
phone:phone.value,
school:school.value,
project:project.value,
status:status.value,
note:note.value,
lastContact:new Date().toISOString()
});
localStorage.setItem("jagofolup_v1",JSON.stringify(leads));
closeModal();
render();
}

function badge(status){
const c={New:"bg-blue-100 text-blue-700",Contacted:"bg-slate-100 text-slate-700", "Follow Up":"bg-yellow-100 text-yellow-700",Hot:"bg-orange-100 text-orange-700",Closing:"bg-green-100 text-green-700",Lost:"bg-red-100 text-red-700"};
return c[status]||c.New;
}

function daysAgo(d){
return Math.floor((Date.now()-new Date(d))/86400000);
}

function wa(id){
const l=leads.find(x=>x.id===id);
const txt=`Assalamu'alaikum ${l.name}, izin follow up terkait program ${l.project} 😊`;
window.open(`https://wa.me/${l.phone}?text=${encodeURIComponent(txt)}`);
}

function delLead(id){
leads=leads.filter(x=>x.id!==id);
localStorage.setItem("jagofolup_v1",JSON.stringify(leads));
render();
}

function render(){
leadList.innerHTML=leads.map(l=>`
<div class="bg-white border rounded-3xl p-5">
<h3 class="font-bold text-lg">${l.name}</h3>
<p class="text-slate-500">${l.school}</p>
<p class="text-slate-500">${l.project}</p>
<span class="inline-block mt-3 px-3 py-1 rounded-full text-sm ${badge(l.status)}">${l.status}</span>
<p class="mt-3 text-sm">Last Contact: ${daysAgo(l.lastContact)} hari lalu</p>
<p class="mt-2 text-sm text-slate-600">${l.note||""}</p>
<div class="flex gap-2 mt-4">
<button onclick="wa(${l.id})" class="bg-teal-600 text-white px-3 py-2 rounded-lg">WhatsApp</button>
<button onclick="delLead(${l.id})" class="bg-red-100 text-red-700 px-3 py-2 rounded-lg">Delete</button>
</div>
</div>`).join("");

hotCount.textContent=leads.filter(x=>x.status==="Hot").length;
followCount.textContent=leads.filter(x=>x.status==="Follow Up").length;
closingCount.textContent=leads.filter(x=>x.status==="Closing").length;
overdueCount.textContent=leads.filter(x=>daysAgo(x.lastContact)>3).length;
}
render();
</script>
</body>
</html>
